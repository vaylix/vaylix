name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vaylix

jobs:
  release-binaries:
    name: Release ${{ matrix.package }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_prefix: vaylix-server

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_prefix: vaylix-client

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_prefix: vaylix-server

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_prefix: vaylix-client

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_prefix: vaylix-server

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_prefix: vaylix-client

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            package: server
            binary: vaylix.exe
            artifact_prefix: vaylix-server

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            package: client
            binary: vaylix-client.exe
            artifact_prefix: vaylix-client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cross for Linux cross-compilation
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" && "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cross build --release --package ${{ matrix.package }} --target ${{ matrix.target }}
          else
            cargo build --release --package ${{ matrix.package }} --target ${{ matrix.target }}
          fi

      - name: Prepare archive directory
        shell: bash
        run: |
          mkdir -p dist

          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/

          cp README.md dist/ || true
          cp LICENSE dist/ || true
          echo "${GITHUB_REF_NAME}" > dist/VERSION

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf ../${{ matrix.artifact_prefix }}-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz *

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/* `
            -DestinationPath "${{ matrix.artifact_prefix }}-${env:GITHUB_REF_NAME}-${{ matrix.target }}.zip"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest

    needs:
      - release-binaries

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: |
            linux/amd64,
            linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
