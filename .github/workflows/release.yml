name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  SERVER_BINARY: vaylix
  CLIENT_BINARY: vaylix-client
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vaylix

jobs:
  release-binaries:
    name: Release ${{ matrix.package }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          # =========================
          # Linux GNU
          # =========================

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_name: vaylix-linux-amd64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_name: vaylix-client-linux-amd64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_name: vaylix-linux-arm64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_name: vaylix-client-linux-arm64

          # =========================
          # Linux MUSL
          # =========================

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_name: vaylix-linux-musl-amd64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_name: vaylix-client-linux-musl-amd64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_name: vaylix-linux-musl-arm64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_name: vaylix-client-linux-musl-arm64

          # =========================
          # macOS
          # =========================

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_name: vaylix-macos-amd64

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_name: vaylix-client-macos-amd64

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_name: vaylix-macos-arm64

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_name: vaylix-client-macos-arm64

          # =========================
          # Windows
          # =========================

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            package: server
            binary: vaylix.exe
            artifact_name: vaylix-windows-amd64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            package: client
            binary: vaylix-client.exe
            artifact_name: vaylix-client-windows-amd64

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            package: server
            binary: vaylix.exe
            artifact_name: vaylix-windows-arm64

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            package: client
            binary: vaylix-client.exe
            artifact_name: vaylix-client-windows-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --package ${{ matrix.package }} --target ${{ matrix.target }}

      - name: Prepare archive directory
        shell: bash
        run: |
          mkdir -p dist

          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/

          cp README.md dist/ || true
          cp LICENSE dist/ || true

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist

          tar -czf ../${{ matrix.artifact_name }}.tar.gz *

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive \
            -Path dist/* \
            -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest

    needs:
      - release-binaries

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: |
            linux/amd64,
            linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
