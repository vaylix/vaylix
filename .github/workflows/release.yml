name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vaylix

jobs:
  release-binaries:
    name: Release ${{ matrix.package }} (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_prefix: vaylix-server
            artifact_suffix: linux-x86_64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_prefix: vaylix-client
            artifact_suffix: linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_prefix: vaylix-server
            artifact_suffix: linux-aarch64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_prefix: vaylix-client
            artifact_suffix: linux-aarch64

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            package: server
            binary: vaylix
            artifact_prefix: vaylix-server
            artifact_suffix: macos-aarch64

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            package: client
            binary: vaylix-client
            artifact_prefix: vaylix-client
            artifact_suffix: macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            package: server
            binary: vaylix.exe
            artifact_prefix: vaylix-server
            artifact_suffix: windows-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            package: client
            binary: vaylix-client.exe
            artifact_prefix: vaylix-client
            artifact_suffix: windows-x86_64

          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
            package: server
            binary: vaylix.exe
            artifact_prefix: vaylix-server
            artifact_suffix: windows-aarch64

          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
            package: client
            binary: vaylix-client.exe
            artifact_prefix: vaylix-client
            artifact_suffix: windows-aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cross for Linux cross-compilation
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          bin_target="${{ matrix.binary }}"
          bin_target="${bin_target%.exe}"
          if [[ "${{ runner.os }}" == "Linux" && "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cross build --locked --release --package ${{ matrix.package }} --bin "${bin_target}" --target ${{ matrix.target }}
          else
            cargo build --locked --release --package ${{ matrix.package }} --bin "${bin_target}" --target ${{ matrix.target }}
          fi

      - name: Prepare archive directory
        shell: bash
        run: |
          mkdir -p dist

          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/

          cp README.md dist/ || true
          cp LICENSE dist/ || true
          echo "${GITHUB_REF_NAME}" > dist/VERSION

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf ../${{ matrix.artifact_prefix }}-${GITHUB_REF_NAME}-${{ matrix.artifact_suffix }}.tar.gz *

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/* `
            -DestinationPath "${{ matrix.artifact_prefix }}-${env:GITHUB_REF_NAME}-${{ matrix.artifact_suffix }}.zip"

      - name: Upload unsigned binary archive
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.artifact_suffix }}-${{ matrix.package }}
          path: |
            *.tar.gz
            *.zip

  sign-release-binaries:
    name: Sign And Publish Release Archives
    runs-on: ubuntu-24.04
    needs:
      - release-binaries

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download unsigned archives
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Generate SBOMs and sign release archives
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          archives=(release-artifacts/*.tar.gz release-artifacts/*.zip)

          if [[ ${#archives[@]} -eq 0 ]]; then
            echo "no release archives downloaded" >&2
            exit 1
          fi

          for archive in "${archives[@]}"; do
            sbom="${archive}.sbom.spdx.json"
            syft "file:${archive}" -o "spdx-json=${sbom}"
            cosign sign-blob --yes --bundle "${archive}.sigstore.json" "${archive}"
            cosign sign-blob --yes --bundle "${sbom}.sigstore.json" "${sbom}"
          done

      - name: Upload signed release artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
            release-artifacts/*.sbom.spdx.json
            release-artifacts/*.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker-platform:
    name: Publish Docker Image (${{ matrix.platform }})
    needs:
      - sign-release-binaries
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            platform_suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            platform_suffix: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=Vaylix
            org.opencontainers.image.description=Vaylix database server

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.platform_suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-${{ matrix.platform_suffix }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.platform_suffix }}

  publish-docker-manifest:
    name: Publish Docker Manifest
    runs-on: ubuntu-24.04
    needs:
      - sign-release-binaries
      - publish-docker-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail

          version_tag="${GITHUB_REF_NAME#v}"
          amd64_ref="${IMAGE_NAME}:${GITHUB_REF_NAME}-amd64"
          arm64_ref="${IMAGE_NAME}:${GITHUB_REF_NAME}-arm64"
          final_refs=("${IMAGE_NAME}:${version_tag}")

          if [[ "${GITHUB_REF_NAME}" != *-* ]]; then
            final_refs+=("${IMAGE_NAME}:latest")
          fi

          for final_ref in "${final_refs[@]}"; do
            docker buildx imagetools create \
              --tag "${final_ref}" \
              "${amd64_ref}" \
              "${arm64_ref}"
          done

      - name: Inspect multi-arch manifest
        id: inspect
        shell: bash
        run: |
          set -euo pipefail
          version_tag="${GITHUB_REF_NAME#v}"
          image_ref="${IMAGE_NAME}:${version_tag}"
          digest="$(docker buildx imagetools inspect "${image_ref}" --format '{{json .Manifest}}' | jq -r '.digest')"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign Docker image and publish SBOM attestation
        shell: bash
        run: |
          set -euo pipefail

          image_ref="${IMAGE_NAME}@${{ steps.inspect.outputs.digest }}"
          sbom="vaylix-docker-${GITHUB_REF_NAME}.sbom.spdx.json"

          cosign sign --yes "${image_ref}"
          syft "${{ steps.inspect.outputs.image_ref }}" -o "spdx-json=${sbom}"
          cosign attest --yes --predicate "${sbom}" --type spdx "${image_ref}"

      - name: Upload Docker SBOM
        uses: softprops/action-gh-release@v3
        with:
          files: vaylix-docker-*.sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
