name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint workspace
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace

      - name: Install nightly toolchain for fuzz smoke
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Run bounded fuzz smokes
        env:
          FUZZ_TARGET: x86_64-unknown-linux-gnu
        run: |
          unset CARGO_BUILD_TARGET
          cd fuzz
          cargo +nightly fuzz run --target "${FUZZ_TARGET}" vtp_frame -- -runs=2048
          cargo +nightly fuzz run --target "${FUZZ_TARGET}" command_text -- -runs=2048
          cargo +nightly fuzz run --target "${FUZZ_TARGET}" auth_handshake -- -runs=2048
          cargo +nightly fuzz run --target "${FUZZ_TARGET}" storage_recovery -- -runs=1024
          cargo +nightly fuzz run --target "${FUZZ_TARGET}" replication_json -- -runs=2048

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit --file Cargo.lock

      - name: Smoke build release binaries
        run: |
          cargo build --locked --release -p server
          cargo build --locked --release -p client
