[package]
name = "server"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "vaylix"
path = "src/main.rs"

[dependencies]
command = { path = "../command" }
engine = { path = "../engine" }
transport = { path = "../transport" }
clap = { version = "4.6.1", features = ["derive"] }
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
argon2 = "0.5.3"
rand = "0.9.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"

[dev-dependencies]
tokio = { version = "1.52.3", features = ["io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }
rand = "0.9.2"
